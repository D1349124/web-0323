<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(1) YouTube - 系統調度中</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div class="yt-logo-pill">
                <span class="play-triangle">▶</span>
            </div>
            <span class="yt-text">YouTube</span>
        </div>

        <div class="video-placeholder">
            <video id="bgVideo" muted autoplay loop playsinline>
                <source src="laizer.mp4" type="video/mp4">
            </video>
            <div class="loading-spinner"></div>
        </div>

        <h1>哎呀！影片正在重新裝填...</h1>
        <p class="status-msg">伺服器目前忙線中，請稍候片刻。</p>

        <div class="progress-wrapper">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p id="timer">預計 30 秒後自動重連...</p>

        <hr class="divider">

        <div class="navigation-zone">
            <div class="button-group">
                <button id="homeBtn" class="yt-dark-btn">🏠 返回首頁</button>
                <button id="likedBtn" class="yt-dark-btn">❤️ 喜歡的影片</button>
            </div>
        </div>

        <button class="retry-btn" onclick="location.reload()">重新載入</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
